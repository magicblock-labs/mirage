name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Verify generated files
        run: |
          npm run openapi:generate
          git diff --exit-code -- openapi/payments.openapi.json src/generated

      - name: Run tests
        run: npm test

      - name: Check package contents
        run: npm pack --dry-run
